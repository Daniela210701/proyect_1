<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erika Barreto | Panel de Visión Artificial</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #38bdf8;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .status {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
            margin: 20px 0;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Proyecto 1: Visión Artificial</h1>
        <p>Desarrollado por Ing. Erika Barreto</p>
        <hr style="border-color: #334155;">
        <p>Estado del Modelo (YOLOv8 + Pygame):</p>
        <div class="status" id="estado">🔴 Sistema Offline</div>
        <p style="font-size: 12px; color: #94a3b8;">Esperando datos del script local...</p>
    </div>

</body>
</html>
